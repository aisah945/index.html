<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Laporan Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-navy { background-color: #0f172a; }
        .text-gold { color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="bg-navy p-6 rounded-t-xl shadow-lg border-b-4 border-gold flex flex-col md:flex-row justify-between items-center no-print">
        <h1 class="text-2xl font-bold text-white mb-4 md:mb-0 tracking-wider">LAPORAN DASHBOARD <span class="text-gold italic">DATA</span></h1>
        <div class="flex gap-4">
            <input type="text" id="filterInput" placeholder="Cari data..." class="px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-gold">
            <button onclick="window.print()" class="bg-gold text-navy font-bold px-6 py-2 rounded-lg hover:bg-yellow-600 transition">Print PDF</button>
        </div>
    </header>

    <main class="bg-white p-6 rounded-b-xl shadow-xl overflow-x-auto">
        <table id="dataTable" class="w-full text-left border-collapse">
            <thead>
                <tr id="tableHead" class="bg-navy text-gold uppercase text-sm leading-normal"></tr>
            </thead>
            <tbody id="tableBody" class="text-gray-700 text-sm font-light"></tbody>
        </table>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRV8yrtQkdfKIcbAdk7Lhz4tPcVJu4xKNOFz7vxqwfiYWcWgrF2hPeph-oQS3z8Jg3r_z3GxhPTgMC9/pub?output=csv';

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true,
                    complete: function(results) {
                        renderTable(results.data);
                    }
                });
            } catch (err) {
                console.error("Gagal mengambil data:", err);
            }
        }

        function renderTable(data) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            if (data.length === 0) return;

            // Header
            const columns = Object.keys(data[0]);
            head.innerHTML = columns.map(col => `<th class="py-3 px-6">${col}</th>`).join('');

            // Body
            const rows = data.map(row => 
                `<tr class="border-b border-gray-200 hover:bg-gray-100">
                    ${columns.map(col => `<td class="py-3 px-6 whitespace-nowrap">${row[col]}</td>`).join('')}
                </tr>`
            ).join('');
            body.innerHTML = rows;

            // Filter logic
            document.getElementById('filterInput').addEventListener('keyup', function() {
                const term = this.value.toLowerCase();
                document.querySelectorAll('#tableBody tr').forEach(tr => {
                    tr.style.display = tr.innerText.toLowerCase().includes(term) ? '' : 'none';
                });
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
